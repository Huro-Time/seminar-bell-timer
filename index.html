<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="ゼミ発表用の1鈴, 2鈴, 3鈴タイマー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ゼミ予鈴">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="icon" href="./icon.png" sizes="1024x1024">
  <title>ゼミ予鈴タイマー</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --danger: #dc2626;
      --warning: #d97706;
      --ok: #059669;
      --violet: #7c3aed;
      --shadow: 0 18px 50px rgba(17, 24, 39, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.10), transparent 28rem),
        var(--bg);
      color: var(--ink);
    }

    body {
      padding: 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      margin: 8px 0 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 6vw, 42px);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .install-note {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .timer-panel {
      text-align: center;
      padding: 26px 18px 22px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: currentColor;
    }

    .status.running {
      background: #ecfdf5;
      color: var(--ok);
    }

    .status.bell1 {
      background: #eff6ff;
      color: var(--accent);
    }

    .status.bell2 {
      background: #fff7ed;
      color: var(--warning);
    }

    .status.bell3 {
      background: #f5f3ff;
      color: var(--violet);
    }

    .status.end {
      background: #fef2f2;
      color: var(--danger);
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-weight: 850;
      letter-spacing: -0.06em;
      font-size: clamp(72px, 20vw, 150px);
      line-height: 0.95;
      margin: 0;
    }

    .subtime {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-variant-numeric: tabular-nums;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 13px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 22px 0 0;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.15s linear, background 0.2s;
    }

    .progress-bar.bell1 {
      background: var(--accent);
    }

    .progress-bar.bell2 {
      background: var(--warning);
    }

    .progress-bar.bell3 {
      background: var(--violet);
    }

    .progress-bar.end {
      background: var(--danger);
    }

    .markers {
      position: relative;
      height: 22px;
      margin-top: 7px;
    }

    .marker {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .marker::before {
      content: "";
      width: 2px;
      height: 8px;
      border-radius: 99px;
      background: currentColor;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 7px;
    }

    .field {
      position: relative;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 18px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .unit {
      position: absolute;
      right: 12px;
      bottom: 14px;
      color: var(--muted);
      font-weight: 800;
      pointer-events: none;
    }

    .field.with-unit input {
      padding-right: 44px;
    }

    .bells {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .bell-row {
      display: grid;
      grid-template-columns: auto 1fr 100px;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }

    @media (max-width: 620px) {
      .bell-row {
        grid-template-columns: auto 1fr;
      }

      .bell-row .field {
        grid-column: 1 / -1;
      }
    }

    .bell-toggle {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
    }

    .bell-name {
      font-weight: 850;
      font-size: 17px;
    }

    .bell-name small {
      display: block;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      margin-top: 2px;
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .check {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 13px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 750;
    }

    .check input {
      width: 20px;
      height: 20px;
      margin: 0;
      accent-color: var(--accent);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 620px) {
      .buttons {
        grid-template-columns: 1fr;
      }
    }

    button {
      border: none;
      border-radius: 15px;
      padding: 15px 14px;
      font-size: 17px;
      font-weight: 850;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: transform 0.04s ease, filter 0.12s ease, background 0.12s;
      min-height: 54px;
    }

    button:active {
      transform: translateY(1px);
    }

    button:hover {
      filter: brightness(0.98);
    }

    button.secondary {
      color: var(--ink);
      background: #e5e7eb;
    }

    button.warning {
      background: var(--warning);
    }

    .small-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    @media (max-width: 620px) {
      .small-buttons {
        grid-template-columns: 1fr;
      }
    }

    .log {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--muted);
      font-size: 14px;
    }

    .log li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
    }

    .log li:last-child {
      border-bottom: none;
    }

    .log strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 10px 0 0;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>ゼミ予鈴タイマー</h1>
      <p class="lead">1鈴, 2鈴, 3鈴を任意の時間に鳴らせるシンプルなタイマーです. 初期設定は1鈴8分, 2鈴10分, 3鈴15分です.</p>
      <p id="installState" class="install-note">ホーム画面に追加して使えます.</p>
    </header>

    <section class="panel timer-panel" aria-label="タイマー表示">
      <div id="status" class="status">
        <span class="status-dot"></span>
        <span id="statusText">待機中</span>
      </div>
      <p id="time" class="time">15:00</p>
      <p id="subtime" class="subtime">経過 00:00 / 発表 15:00</p>
      <div class="progress" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="markers" class="markers" aria-hidden="true"></div>
    </section>

    <section class="panel" aria-label="設定">
      <div class="grid">
        <div class="field with-unit">
          <label for="totalMinutes">発表時間</label>
          <input id="totalMinutes" type="number" min="1" max="180" step="1" inputmode="numeric" value="15">
          <span class="unit">分</span>
        </div>
        <div class="field">
          <label for="timeBase">ベル時間の基準</label>
          <select id="timeBase">
            <option value="elapsed">開始から何分後</option>
            <option value="remaining">終了の何分前</option>
          </select>
        </div>
      </div>

      <div class="bells" aria-label="ベル設定">
        <div class="bell-row">
          <input class="bell-toggle" id="bell1Enabled" type="checkbox" checked>
          <div class="bell-name">
            <label for="bell1Minutes">1鈴</label>
            <small>短く1回鳴らす</small>
          </div>
          <div class="field with-unit">
            <input id="bell1Minutes" type="number" min="0" max="180" step="1" inputmode="numeric" value="8">
            <span class="unit">分</span>
          </div>
        </div>

        <div class="bell-row">
          <input class="bell-toggle" id="bell2Enabled" type="checkbox" checked>
          <div class="bell-name">
            <label for="bell2Minutes">2鈴</label>
            <small>2回鳴らす</small>
          </div>
          <div class="field with-unit">
            <input id="bell2Minutes" type="number" min="0" max="180" step="1" inputmode="numeric" value="10">
            <span class="unit">分</span>
          </div>
        </div>

        <div class="bell-row">
          <input class="bell-toggle" id="bell3Enabled" type="checkbox" checked>
          <div class="bell-name">
            <label for="bell3Minutes">3鈴</label>
            <small>3回鳴らす</small>
          </div>
          <div class="field with-unit">
            <input id="bell3Minutes" type="number" min="0" max="180" step="1" inputmode="numeric" value="15">
            <span class="unit">分</span>
          </div>
        </div>
      </div>

      <div class="toggles">
        <label class="check">
          <input id="vibration" type="checkbox" checked>
          対応端末では振動も使う
        </label>
      </div>

      <p class="note">「開始から何分後」の場合, 1鈴8分なら開始8分後に鳴ります. 「終了の何分前」に切り替えると, 1鈴8分なら終了8分前に鳴ります. ゼミ中は画面をロックせず, マナーモードを解除して使ってください.</p>
    </section>

    <section class="panel" aria-label="操作">
      <div class="buttons">
        <button id="startPauseBtn">スタート</button>
        <button id="resetBtn" class="secondary">リセット</button>
        <button id="testBtn" class="warning">ベル音テスト</button>
      </div>

      <div class="small-buttons">
        <button class="secondary" data-preset="10">10分発表</button>
        <button class="secondary" data-preset="15">15分発表</button>
        <button class="secondary" data-preset="20">20分発表</button>
      </div>
    </section>

    <section class="panel" aria-label="ベル予定">
      <label>ベル予定</label>
      <ul id="log" class="log"></ul>
    </section>
  </main>

  <script>
    const els = {
      totalMinutes: document.getElementById("totalMinutes"),
      timeBase: document.getElementById("timeBase"),
      bell1Enabled: document.getElementById("bell1Enabled"),
      bell1Minutes: document.getElementById("bell1Minutes"),
      bell2Enabled: document.getElementById("bell2Enabled"),
      bell2Minutes: document.getElementById("bell2Minutes"),
      bell3Enabled: document.getElementById("bell3Enabled"),
      bell3Minutes: document.getElementById("bell3Minutes"),
      vibration: document.getElementById("vibration"),
      startPauseBtn: document.getElementById("startPauseBtn"),
      resetBtn: document.getElementById("resetBtn"),
      testBtn: document.getElementById("testBtn"),
      time: document.getElementById("time"),
      subtime: document.getElementById("subtime"),
      status: document.getElementById("status"),
      statusText: document.getElementById("statusText"),
      progressBar: document.getElementById("progressBar"),
      markers: document.getElementById("markers"),
      log: document.getElementById("log"),
      installState: document.getElementById("installState")
    };

    const STORAGE_KEY = "seminarBellTimerSettings_v3";
    let audioCtx = null;
    let running = false;
    let startedAt = 0;
    let elapsedBeforePause = 0;
    let rafId = null;
    let wakeLock = null;
    let firedBellIds = new Set();

    if (window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone) {
      els.installState.textContent = "ホーム画面アプリとして起動中です.";
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {
          els.installState.textContent = "サービスワーカー登録に失敗しました. HTTPSで公開するとオフライン対応が有効になります.";
        });
      });
    }

    function clampNumber(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.min(max, Math.max(min, n));
    }

    function getSettings() {
      const totalMinutes = clampNumber(els.totalMinutes.value, 1, 180, 15);
      const totalSec = totalMinutes * 60;
      const timeBase = els.timeBase.value === "remaining" ? "remaining" : "elapsed";

      const rawBells = [
        {
          id: "bell1",
          name: "1鈴",
          minutes: clampNumber(els.bell1Minutes.value, 0, 180, 8),
          enabled: els.bell1Enabled.checked,
          count: 1
        },
        {
          id: "bell2",
          name: "2鈴",
          minutes: clampNumber(els.bell2Minutes.value, 0, 180, 10),
          enabled: els.bell2Enabled.checked,
          count: 2
        },
        {
          id: "bell3",
          name: "3鈴",
          minutes: clampNumber(els.bell3Minutes.value, 0, 180, 15),
          enabled: els.bell3Enabled.checked,
          count: 3
        }
      ];

      const bells = rawBells
        .filter(b => b.enabled)
        .map(b => {
          const sec = timeBase === "remaining"
            ? Math.max(0, totalSec - b.minutes * 60)
            : b.minutes * 60;

          return {
            ...b,
            atSec: Math.min(totalSec, Math.max(0, sec))
          };
        })
        .sort((a, b) => a.atSec - b.atSec || a.count - b.count);

      return {
        totalMinutes,
        totalSec,
        timeBase,
        bells,
        rawBells,
        vibration: els.vibration.checked
      };
    }

    function saveSettings() {
      const s = getSettings();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        totalMinutes: s.totalMinutes,
        timeBase: s.timeBase,
        vibration: s.vibration,
        bell1: {
          enabled: els.bell1Enabled.checked,
          minutes: clampNumber(els.bell1Minutes.value, 0, 180, 8)
        },
        bell2: {
          enabled: els.bell2Enabled.checked,
          minutes: clampNumber(els.bell2Minutes.value, 0, 180, 10)
        },
        bell3: {
          enabled: els.bell3Enabled.checked,
          minutes: clampNumber(els.bell3Minutes.value, 0, 180, 15)
        }
      }));
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s.totalMinutes != null) els.totalMinutes.value = s.totalMinutes;
        if (s.timeBase === "remaining" || s.timeBase === "elapsed") els.timeBase.value = s.timeBase;
        if (s.vibration != null) els.vibration.checked = Boolean(s.vibration);

        if (s.bell1) {
          els.bell1Enabled.checked = Boolean(s.bell1.enabled);
          if (s.bell1.minutes != null) els.bell1Minutes.value = s.bell1.minutes;
        }
        if (s.bell2) {
          els.bell2Enabled.checked = Boolean(s.bell2.enabled);
          if (s.bell2.minutes != null) els.bell2Minutes.value = s.bell2.minutes;
        }
        if (s.bell3) {
          els.bell3Enabled.checked = Boolean(s.bell3.enabled);
          if (s.bell3.minutes != null) els.bell3Minutes.value = s.bell3.minutes;
        }
      } catch {
        // Ignore invalid storage.
      }
    }

    function formatTime(seconds) {
      seconds = Math.max(0, Math.ceil(seconds));
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function setStatus(kind, text) {
      els.status.className = "status";
      if (kind) els.status.classList.add(kind);
      els.statusText.textContent = text;
    }

    function updateLogAndMarkers() {
      const s = getSettings();
      const baseText = s.timeBase === "remaining" ? "終了前" : "開始後";

      if (s.bells.length === 0) {
        els.log.innerHTML = "<li><span>ベル</span><strong>有効なベルなし</strong></li>";
      } else {
        els.log.innerHTML = s.bells.map(b => {
          return `<li><span>${b.name}</span><strong>${baseText} ${b.minutes}分, ${formatTime(b.atSec)}</strong></li>`;
        }).join("");
      }

      els.markers.innerHTML = s.bells.map(b => {
        const left = s.totalSec > 0 ? Math.min(100, Math.max(0, b.atSec / s.totalSec * 100)) : 0;
        return `<span class="marker" style="left:${left}%">${b.name}</span>`;
      }).join("");
    }

    function updateDisplay(elapsedSec = elapsedBeforePause) {
      const s = getSettings();
      const remaining = Math.max(0, s.totalSec - elapsedSec);
      const progress = Math.min(100, Math.max(0, elapsedSec / s.totalSec * 100));

      els.time.textContent = formatTime(remaining);
      els.subtime.textContent = `経過 ${formatTime(elapsedSec)} / 発表 ${formatTime(s.totalSec)}`;
      els.progressBar.style.width = `${progress}%`;

      els.progressBar.className = "progress-bar";

      const latestPassed = [...s.bells].reverse().find(b => elapsedSec >= b.atSec);
      if (elapsedSec >= s.totalSec) {
        els.progressBar.classList.add("end");
        setStatus("end", "終了");
      } else if (latestPassed) {
        const kind = latestPassed.id === "bell1" ? "bell1" : latestPassed.id === "bell2" ? "bell2" : "bell3";
        els.progressBar.classList.add(kind);
        if (running) {
          setStatus(kind, `${latestPassed.name}後`);
        }
      } else if (running) {
        setStatus("running", "進行中");
      } else {
        setStatus("", "待機中");
      }

      if (!running && elapsedSec > 0 && elapsedSec < s.totalSec) {
        setStatus("", "一時停止中");
      }
    }

    async function ensureAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
      }
      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }
    }

    function playBell(count = 1) {
      ensureAudio().then(() => {
        const now = audioCtx.currentTime;
        const master = audioCtx.createGain();
        master.connect(audioCtx.destination);

        const safeCount = Math.min(5, Math.max(1, count));
        const pattern = Array.from({ length: safeCount }, (_, i) => i * 0.42);

        pattern.forEach(offset => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = "sine";
          osc.frequency.setValueAtTime(860, now + offset);
          osc.frequency.exponentialRampToValueAtTime(520, now + offset + 0.32);

          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.75, now + offset + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.34);

          osc.connect(gain);
          gain.connect(master);
          osc.start(now + offset);
          osc.stop(now + offset + 0.36);
        });

        master.gain.setValueAtTime(0.78, now);
        master.gain.exponentialRampToValueAtTime(0.0001, now + pattern[pattern.length - 1] + 0.58);
      }).catch(() => {
        alert("音声の再生に失敗しました. 端末の音量, マナーモード, ブラウザの許可を確認してください.");
      });

      const s = getSettings();
      if (s.vibration && "vibrate" in navigator) {
        if (count === 1) navigator.vibrate([220]);
        else if (count === 2) navigator.vibrate([220, 120, 220]);
        else navigator.vibrate([220, 120, 220, 120, 220]);
      }
    }

    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request("screen");
      } catch {
        wakeLock = null;
      }
    }

    async function releaseWakeLock() {
      if (!wakeLock) return;
      try {
        await wakeLock.release();
      } catch {
        // Ignore wake lock release failures.
      } finally {
        wakeLock = null;
      }
    }

    function currentElapsedSec() {
      if (!running) return elapsedBeforePause;
      return elapsedBeforePause + (performance.now() - startedAt) / 1000;
    }

    function tick() {
      const s = getSettings();
      const elapsed = currentElapsedSec();

      for (const bell of s.bells) {
        const shouldFire = elapsed >= bell.atSec && !firedBellIds.has(bell.id);
        const notAtZero = bell.atSec > 0;
        if (shouldFire && notAtZero) {
          firedBellIds.add(bell.id);
          playBell(bell.count);
        }
      }

      if (elapsed >= s.totalSec) {
        stopAtEnd();
        updateDisplay(s.totalSec);
        return;
      }

      updateDisplay(elapsed);
      rafId = requestAnimationFrame(tick);
    }

    function start() {
      const s = getSettings();

      if (elapsedBeforePause >= s.totalSec) {
        elapsedBeforePause = 0;
        firedBellIds = new Set();
      }

      saveSettings();
      running = true;
      startedAt = performance.now();
      els.startPauseBtn.textContent = "一時停止";
      els.startPauseBtn.classList.add("warning");
      requestWakeLock();
      tick();
    }

    function pause() {
      elapsedBeforePause = currentElapsedSec();
      running = false;
      cancelAnimationFrame(rafId);
      els.startPauseBtn.textContent = "再開";
      els.startPauseBtn.classList.remove("warning");
      releaseWakeLock();
      updateDisplay(elapsedBeforePause);
    }

    function stopAtEnd() {
      elapsedBeforePause = getSettings().totalSec;
      running = false;
      cancelAnimationFrame(rafId);
      els.startPauseBtn.textContent = "スタート";
      els.startPauseBtn.classList.remove("warning");
      releaseWakeLock();
    }

    function reset() {
      running = false;
      cancelAnimationFrame(rafId);
      elapsedBeforePause = 0;
      firedBellIds = new Set();
      els.startPauseBtn.textContent = "スタート";
      els.startPauseBtn.classList.remove("warning");
      releaseWakeLock();
      updateDisplay(0);
      updateLogAndMarkers();
    }

    function handleSettingChange() {
      saveSettings();
      updateLogAndMarkers();
      if (!running) {
        const s = getSettings();
        elapsedBeforePause = Math.min(elapsedBeforePause, s.totalSec);
        firedBellIds = new Set();
        updateDisplay(elapsedBeforePause);
      }
    }

    els.startPauseBtn.addEventListener("click", async () => {
      await ensureAudio();
      if (running) {
        pause();
      } else {
        start();
      }
    });

    els.resetBtn.addEventListener("click", reset);

    els.testBtn.addEventListener("click", async () => {
      await ensureAudio();
      playBell(3);
    });

    [
      els.totalMinutes,
      els.timeBase,
      els.bell1Enabled,
      els.bell1Minutes,
      els.bell2Enabled,
      els.bell2Minutes,
      els.bell3Enabled,
      els.bell3Minutes,
      els.vibration
    ].forEach(el => {
      el.addEventListener("change", handleSettingChange);
      el.addEventListener("input", handleSettingChange);
    });

    document.querySelectorAll("[data-preset]").forEach(btn => {
      btn.addEventListener("click", () => {
        const minutes = Number(btn.dataset.preset);
        els.totalMinutes.value = minutes;
        els.timeBase.value = "elapsed";

        if (minutes === 10) {
          els.bell1Minutes.value = 7;
          els.bell2Minutes.value = 9;
          els.bell3Minutes.value = 10;
        } else if (minutes === 15) {
          els.bell1Minutes.value = 8;
          els.bell2Minutes.value = 10;
          els.bell3Minutes.value = 15;
        } else if (minutes === 20) {
          els.bell1Minutes.value = 12;
          els.bell2Minutes.value = 15;
          els.bell3Minutes.value = 20;
        }

        els.bell1Enabled.checked = true;
        els.bell2Enabled.checked = true;
        els.bell3Enabled.checked = true;
        reset();
        saveSettings();
        updateLogAndMarkers();
      });
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && running) {
        requestWakeLock();
      }
    });

    loadSettings();
    updateLogAndMarkers();
    updateDisplay(0);
  </script>
</body>
</html>
